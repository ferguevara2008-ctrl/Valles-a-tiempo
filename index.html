<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Valles a Tiempo</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
body{
margin:0;
font-family: Arial;
background:#ddd;
display:flex;
justify-content:center;
}

html, body {
height: 100%;
}
    
.app{
width:460px;
height:740px;
background:white;
border-radius:20px;
overflow:hidden;
position:relative;
box-shadow:0 10px 30px rgba(0,0,0,0.3);
}

.topbar{
position:absolute;
top:10px;
left:10px;
right:10px;
background:white;
padding:10px;
border-radius:10px;
z-index:1000;
}

#map{
height:100%;
}

.panel{
position:absolute;
bottom:0;
left:0;
right:0;
background:white;
border-radius:20px 20px 0 0;
padding:15px;
z-index:1000;
max-height:40%;
overflow:auto;
}

.gps-btn{
position:absolute;
bottom:120px;
right:15px;
background:white;
padding:10px;
border-radius:50%;
cursor:pointer;
z-index:1000;
}
</style>

</head>

<body>

<div class="app">

<div class="topbar">
<input placeholder="Buscar ruta...">
</div>

<div id="map"></div>

<div class="gps-btn" onclick="centrarUsuario()">📍</div>

<div class="panel">
<h3>🚌 Ruta Boulevard</h3>
<div id="lista">Cargando tiempos...</div>
</div>

</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

var map = L.map('map').setView([21.99, -99.01], 14);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

setTimeout(() => {
    map.invalidateSize();
}, 500);
    
var paradas = [
{nombre:"Central", coords:[21.9692, -98.9977]},
{nombre:"Volkswagen", coords:[21.9755, -99.0025]},
{nombre:"Agua Alaska", coords:[21.9832, -99.0087]},
{nombre:"BBVA", coords:[21.9855, -99.0108]},
{nombre:"Telmex", coords:[21.9872, -99.0116]},
{nombre:"Norte", coords:[21.9915, -99.0120]}
];

paradas.forEach(p=>{
L.marker(p.coords).addTo(map).bindPopup(p.nombre);
});

var userMarker;

if(navigator.geolocation){
navigator.geolocation.watchPosition(pos=>{
let lat = pos.coords.latitude;
let lon = pos.coords.longitude;

if(userMarker){
userMarker.setLatLng([lat,lon]);
}else{
userMarker = L.marker([lat,lon]).addTo(map)
.bindPopup("Tu ubicación");
}
});
}

function centrarUsuario(){
if(userMarker){
map.setView(userMarker.getLatLng(), 16);
}
}

function distancia(a,b){
let R = 6371;
let dLat = (b[0]-a[0]) * Math.PI/180;
let dLon = (b[1]-a[1]) * Math.PI/180;

let lat1 = a[0]*Math.PI/180;
let lat2 = b[0]*Math.PI/180;

let x = Math.sin(dLat/2)**2 +
Math.cos(lat1)*Math.cos(lat2) *
Math.sin(dLon/2)**2;

let c = 2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x));
return R*c;
}

fetch("ruta.geojson")
.then(res=>{
    if(!res.ok) throw new Error("No se encontró ruta.geojson");
    return res.json();
})
.then(data=>{

    function colorPorTrafico(){
        let r = Math.random();
        if(r < 0.5) return "green";
        if(r < 0.8) return "orange";
        return "red";
        if(ruta.length > 0){
    iniciarBus(ruta);
    calcularTiempos(ruta[0]); 
                           }
    }

    let ruta = [];

    data.features.forEach(f => {

        if(f.geometry.type === "LineString"){

            let coords = f.geometry.coordinates.map(c => [c[1], c[0]]);
            ruta = coords;
            
            for(let i = 0; i < coords.length - 1; i++){

                let color = colorPorTrafico();

                L.polyline([coords[i], coords[i+1]], {
                    color: color,
                    weight: 7,
                    opacity: 0.9
                }).addTo(map);

            }

            map.fitBounds(coords);
        }

    });
    console.log("Ruta cargada:", ruta.length);
    if(ruta.length > 0){
        iniciarBus(ruta);
    } else {
        alert("No se pudo cargar la ruta");
    }

})
.catch(err=>{
    console.error(err);
});


    function iniciarBus(ruta){

    if(!ruta || ruta.length === 0){
        console.error("Ruta inválida");
        return;
    }

    var busIcon = L.icon({
        iconUrl:"https://cdn-icons-png.flaticon.com/512/61/61231.png",
        iconSize:[30,30]
    });

    var bus = L.marker(ruta[0], {icon:busIcon}).addTo(map);

    var i = 0;

    calcularTiempos(ruta[0]);

    setInterval(()=>{

        i++;
        if(i >= ruta.length) i = 0;

        bus.setLatLng(ruta[i]);

        calcularTiempos(ruta[i]);

    },500);
}


function calcularTiempos(pos){

    if(!pos) return;

    let html = "<b>Tiempo estimado:</b><br>";

    paradas.forEach(p=>{

        let d = distancia(pos, p.coords);
        let v = 25;
        let t = (d/v)*60;

        html += `
        <div style="
            padding:8px;
            margin:5px 0;
            background:#f5f5f5;
            border-radius:8px;
        ">
            🛑 ${p.nombre}<br>
            ⏱ <b>${t.toFixed(1)} min</b>
        </div>
        `;
    });

    document.getElementById("lista").innerHTML = html;
}

</script>

</body>
</html>
